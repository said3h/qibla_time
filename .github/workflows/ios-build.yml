name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS app
    runs-on: macos-14
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.19.3
          cache: true

      - name: Show Flutter environment
        run: |
          flutter --version
          flutter doctor -v

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Analyze Dart code
        run: flutter analyze --no-fatal-infos

      - name: Precache iOS artifacts
        run: flutter precache --ios

      - name: Install iOS pods
        working-directory: ios
        run: pod install

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        run: |
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Error: Runner.app not found at $APP_PATH"
            exit 1
          fi

          rm -rf Payload QiblaTime-unsigned.ipa
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/Runner.app
          ditto -c -k --sequesterRsrc --keepParent Payload QiblaTime-unsigned.ipa

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qibla-time-ios-unsigned
          path: |
            QiblaTime-unsigned.ipa
            build/ios/iphoneos/Runner.app
          retention-days: 30
