name: Build iOS

on:
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build iOS Application
        run: |
          flutter pub get
          # We use the higher-level command but with extra flags for CI stability
          flutter build ios --release --no-codesign --verbose
      - name: Create IPA
        run: |
          # Manual packaging of the produced .app bundle into a .ipa file
          mkdir -p Payload
          # Locate the .app bundle
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)
          echo "Found app at: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r QiblaTime.ipa Payload
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QiblaTime-IPA
          path: QiblaTime.ipa
