name: Build iOS

on:
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Flutter Submodule/Plugin Setup
        run: |
          flutter pub get
          # We run this to let Flutter generate the necessary native files, 
          # even if it fails at the signing stage, we want the generated files.
          flutter build ios --release --no-codesign || true
      - name: Install CocoaPods
        run: |
          cd ios
          pod install
      - name: Build iOS (Manual xcodebuild)
        run: |
          # Now we build using xcodebuild directly to bypass the "Team ID" requirement
          xcodebuild -workspace ios/Runner.xcworkspace \
                     -scheme Runner \
                     -configuration Release \
                     -sdk iphoneos \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_IDENTITY="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     build
      - name: Prepare IPA
        run: |
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload
          zip -r QiblaTime.ipa Payload
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QiblaTime-IPA
          path: QiblaTime.ipa
