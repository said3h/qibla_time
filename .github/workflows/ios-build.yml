name: Build iOS

on:
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build iOS Application
        run: |
          flutter pub get
          # 1. Prepare Flutter build artifacts. 
          # Even if it fails at the signing check, it usually generates the necessary frameworks.
          flutter build ios --release --no-codesign || true
          
          # 2. Ensure CocoaPods is strictly up to date and linking correctly
          cd ios
          pod install
          cd ..
          
          # 3. Use xcodebuild directly to bypass the Flutter Tool's pre-emptive Team ID check.
          # We use the flags we just added to the project file as backup.
          xcodebuild -workspace ios/Runner.xcworkspace \
                     -scheme Runner \
                     -configuration Release \
                     -sdk iphoneos \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_IDENTITY="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     build
      - name: Create IPA
        run: |
          # Manual packaging of the produced .app bundle into a .ipa file
          mkdir -p Payload
          # Locate the .app bundle
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)
          echo "Found app at: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r QiblaTime.ipa Payload
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QiblaTime-IPA
          path: QiblaTime.ipa
