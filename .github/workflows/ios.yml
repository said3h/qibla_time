name: iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Verify Flutter version
        run: flutter --version

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Get dependencies
        run: flutter pub get

      - name: Install pods
        run: cd ios && pod install

      - name: Prepare iOS build config
        run: flutter build ios --release --no-codesign --config-only

      - name: Build unsigned Runner.app
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -derivedDataPath build/ios \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package .app as .ipa
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/Build/Products/Release-iphoneos/Runner.app build/ios/ipa/Payload/Runner.app
          cd build/ios/ipa
          zip -r QiblaTime.ipa Payload

      - name: Upload Runner.app
        uses: actions/upload-artifact@v4
        with:
          name: QiblaTime-ios-app
          path: build/ios/Build/Products/Release-iphoneos/Runner.app

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: QiblaTime-ios
          path: build/ios/ipa/QiblaTime.ipa
