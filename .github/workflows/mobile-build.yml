name: Mobile Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Android APK
            os: ubuntu-latest
            platform: android
          - name: iOS IPA
            os: macos-latest
            platform: ios
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        if: matrix.platform == 'android'
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Cache Gradle wrapper
        if: matrix.platform == 'android'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Verify Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Clean build artifacts
        run: flutter clean

      - name: Run tests
        run: flutter test

      - name: Configure Android release signing (upload key)
        if: matrix.platform == 'android'
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_FILENAME: ${{ secrets.ANDROID_KEYSTORE_FILENAME }}
        run: |
          set -euo pipefail

          if [[ -z "${ANDROID_KEYSTORE_BASE64}" ]]; then
            echo "Missing ANDROID_KEYSTORE_BASE64 secret" >&2
            exit 1
          fi
          if [[ -z "${ANDROID_KEYSTORE_PASSWORD}" || -z "${ANDROID_KEY_ALIAS}" || -z "${ANDROID_KEY_PASSWORD}" || -z "${ANDROID_KEYSTORE_FILENAME}" ]]; then
            echo "Missing one or more Android signing secrets" >&2
            exit 1
          fi

          # Write keystore to android/app/<filename> (never committed).
          mkdir -p android/app
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "android/app/${ANDROID_KEYSTORE_FILENAME}"
          chmod 600 "android/app/${ANDROID_KEYSTORE_FILENAME}"

          # Create android/key.properties (read by android/app/build.gradle via rootProject.file("key.properties")).
          cat > android/key.properties <<EOF
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyPassword=${ANDROID_KEY_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          storeFile=app/${ANDROID_KEYSTORE_FILENAME}
          EOF
          chmod 600 android/key.properties

          echo "Android release signing configured."

      - name: Build debug APK
        if: matrix.platform == 'android'
        run: flutter build apk --debug

      - name: Build release APK
        if: matrix.platform == 'android'
        run: flutter build apk --release

      - name: Build release App Bundle (AAB)
        if: matrix.platform == 'android'
        run: flutter build appbundle --release

      - name: Verify release APK signing certificate SHA-256
        if: matrix.platform == 'android'
        shell: bash
        run: |
          set -euo pipefail
          APK="build/app/outputs/flutter-apk/app-release.apk"
          if [[ ! -f "${APK}" ]]; then
            echo "APK not found at ${APK}" >&2
            exit 1
          fi

          # keytool output includes SHA-256; we assert it matches the expected upload key.
          EXPECTED="58:E1:28:D0:D0:35:23:38:AB:3C:C0:66:CA:19:85:5D:77:56:AA:34:83:CF:50:41:4E:03:8F:F4:C7:24:06:9A"
          KEYTOOL_OUT="$(LANG=C keytool -printcert -jarfile "${APK}")"
          echo "${KEYTOOL_OUT}"
          ACTUAL="$(echo "${KEYTOOL_OUT}" | grep -Eio 'SHA-?256[^:]*:[[:space:]]*[0-9A-F:]+' | head -n 1 | sed -E 's/.*:[[:space:]]*//')"

          if [[ -z "${ACTUAL}" ]]; then
            echo "Failed to read SHA-256 from APK cert" >&2
            exit 1
          fi

          echo "APK cert SHA-256: ${ACTUAL}"
          if [[ "${ACTUAL}" != "${EXPECTED}" ]]; then
            echo "ERROR: APK SHA-256 does not match expected upload key." >&2
            echo "Expected: ${EXPECTED}" >&2
            echo "Actual:   ${ACTUAL}" >&2
            exit 1
          fi

      - name: Upload debug APK
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: qiblatime-android-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload release APK
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: qiblatime-android-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload release App Bundle (AAB)
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: qiblatime-android-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14

      - name: Install CocoaPods
        if: matrix.platform == 'ios'
        run: sudo gem install cocoapods

      - name: Install pods
        if: matrix.platform == 'ios'
        run: cd ios && pod install

      - name: Prepare iOS build config
        if: matrix.platform == 'ios'
        run: flutter build ios --release --no-codesign --config-only

      - name: Build unsigned Runner archive
        if: matrix.platform == 'ios'
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -derivedDataPath build/ios-derived \
            -archivePath build/ios/archive/Runner.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            archive

      - name: Package .app as .ipa
        if: matrix.platform == 'ios'
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app build/ios/ipa/Payload/Runner.app
          cd build/ios/ipa
          zip -r QiblaTime.ipa Payload

      - name: Upload Runner.app
        if: matrix.platform == 'ios'
        uses: actions/upload-artifact@v4
        with:
          name: qiblatime-ios-app
          path: build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app
          if-no-files-found: error
          retention-days: 14

      - name: Upload IPA
        if: matrix.platform == 'ios'
        uses: actions/upload-artifact@v4
        with:
          name: qiblatime-ios-ipa
          path: build/ios/ipa/QiblaTime.ipa
          if-no-files-found: error
          retention-days: 14
