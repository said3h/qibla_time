plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def keyPropertiesFile = rootProject.file("key.properties")
def keyProperties = new Properties()
if (keyPropertiesFile.exists()) {
    keyPropertiesFile.withInputStream { stream -> keyProperties.load(stream) }
}

def releaseStoreFile = keyProperties['storeFile'] ? file(keyProperties['storeFile']) : null
def isPlaceholderSigningValue = { value ->
    if (value == null) {
        return true
    }
    def normalized = value.toString().trim().toUpperCase(java.util.Locale.ROOT)
    return normalized.isEmpty() ||
        normalized.contains('TU_CONTRASE') ||
        normalized.contains('CHANGE_ME')
}

def hasValidReleaseSigning =
    keyPropertiesFile.exists() &&
    keyProperties['keyAlias'] &&
    keyProperties['keyPassword'] &&
    keyProperties['storePassword'] &&
    releaseStoreFile != null &&
    releaseStoreFile.exists() &&
    !isPlaceholderSigningValue(keyProperties['keyPassword']) &&
    !isPlaceholderSigningValue(keyProperties['storePassword'])

android {
    namespace "com.qiblatime.qibla_time"
    compileSdk 36
    ndkVersion "27.0.12077973"

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.qiblatime.qibla_time"
        minSdkVersion flutter.minSdkVersion
        targetSdk 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    signingConfigs {
        release {
            if (hasValidReleaseSigning) {
                keyAlias keyProperties['keyAlias']
                keyPassword keyProperties['keyPassword']
                storeFile releaseStoreFile
                storePassword keyProperties['storePassword']
            }
        }
    }

    buildTypes {
        release {
            signingConfig hasValidReleaseSigning ? signingConfigs.release : signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}
