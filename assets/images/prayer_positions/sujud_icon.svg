<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Buffalo/Horned animal in Rakah (prayer) position -->
  <!-- Body - large curved shape representing the animal in prostration -->
  <ellipse cx="80" cy="100" rx="50" ry="45" fill="#000000"/>

  <!-- Neck connecting to head -->
  <path d="M 50 70 Q 40 55, 35 45" stroke="#000000" stroke-width="20" fill="none" stroke-linecap="round"/>

  <!-- Head -->
  <circle cx="30" cy="35" r="22" fill="#000000"/>

  <!-- Left Horn -->
  <path d="M 15 20 Q 5 8, 10 -5" stroke="#000000" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- Right Horn -->
  <path d="M 45 18 Q 55 5, 52 -8" stroke="#000000" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- Snout -->
  <ellipse cx="15" cy="42" rx="8" ry="12" fill="#000000"/>

  <!-- Ear -->
  <ellipse cx="20" cy="25" rx="7" ry="15" fill="#000000"/>

  <!-- Front legs (bent, in prayer position) -->
  <path d="M 60 140 Q 55 165, 50 190" stroke="#000000" stroke-width="16" fill="none" stroke-linecap="round"/>
  <path d="M 75 145 Q 70 170, 65 195" stroke="#000000" stroke-width="16" fill="none" stroke-linecap="round"/>

  <!-- Back legs (extended, in prayer position) -->
  <path d="M 100 135 Q 110 160, 125 190" stroke="#000000" stroke-width="16" fill="none" stroke-linecap="round"/>
  <path d="M 115 138 Q 125 165, 140 195" stroke="#000000" stroke-width="16" fill="none" stroke-linecap="round"/>

  <!-- Tail -->
  <path d="M 125 95 Q 150 90, 165 80" stroke="#000000" stroke-width="12" fill="none" stroke-linecap="round"/>
</svg>
