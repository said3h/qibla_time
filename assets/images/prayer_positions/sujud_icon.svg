<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 105">
  <!-- Person in Ruku (Islamic prayer bow) - side view silhouette -->

  <!-- Head (upper right) -->
  <circle cx="76" cy="15" r="13" fill="currentColor"/>
  <!-- Kufi white band -->
  <path d="M 65 12 Q 70 3 76 3 Q 82 3 87 12" fill="white"/>

  <!-- Body: back + torso diagonal -->
  <path d="
    M 86 22
    C 82 24, 74 26, 66 30
    C 56 34, 44 39, 32 46
    C 22 52, 14 60, 10 70
    C 6 78, 8 88, 14 95
    C 18 100, 24 103, 30 102
    C 38 100, 44 93, 44 84
    C 44 75, 38 67, 30 64
    C 38 59, 50 53, 62 47
    C 72 42, 82 36, 88 28
    C 90 22, 88 20, 86 22
    Z
  " fill="currentColor"/>

  <!-- Lower robe bulk -->
  <path d="
    M 10 68
    C 4 76, 2 88, 6 97
    C 10 106, 22 110, 34 107
    C 42 104, 48 96, 46 86
    C 44 78, 38 70, 30 66
    C 22 62, 14 62, 10 68
    Z
  " fill="currentColor"/>

  <!-- Arms as white X crossing the body -->
  <line x1="60" y1="30" x2="24" y2="78" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <line x1="40" y1="38" x2="10" y2="76" stroke="white" stroke-width="6.5" stroke-linecap="round"/>

  <!-- Feet -->
  <rect x="4"  y="97" width="13" height="7" rx="3.5" fill="currentColor"/>
  <rect x="20" y="100" width="13" height="7" rx="3.5" fill="currentColor"/>
</svg>
