name: qibla_time
description: "A new Flutter project."
publish_to: 'none'

version: 1.3.0+1

environment:
  sdk: '>=3.3.1 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.4.0
  url_launcher: ^6.3.1
  flutter_compass: ^0.8.1
  geolocator: ^10.1.0
  adhan: ^2.0.0+1
  hijri: ^3.0.0
  share_plus: ^7.2.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.4
  intl: ^0.20.2
  http: ^1.2.1
  ffmpeg_kit_min_gpl: ^6.0.3
  flutter_local_notifications: ^16.3.0
  audioplayers: ^5.2.0
  scrollable_positioned_list: ^0.3.8
  permission_handler: ^10.4.0
  timezone: ^0.9.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^5.0.0
  geocoding: ^2.1.0
  home_widget: ^0.5.0
  # proximity_sensor removido - usando EventChannel nativo para sensor de proximidad
  
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  cupertino_icons: ^1.0.8

flutter:
  uses-material-design: true
  generate: true

  # Assets de audio para Adhan y otros sonidos
  assets:
    - assets/audio/
    - assets/hadiths/
    - assets/data/

  # Fuentes personalizadas Amiri
  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
    - family: AmiriQuran
      fonts:
        - asset: assets/fonts/AmiriQuran.ttf

dependency_overrides:
  path_provider_android: 2.2.19
  shared_preferences_android: 2.4.13
  url_launcher_android: 6.3.20
  win32: ^5.5.0
