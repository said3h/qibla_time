name: qibla_time
description: "Horarios de oración, Qibla, Corán, Dhikr — sin anuncios ni rastreo de datos."
publish_to: 'none'

version: 1.3.0+1

environment:
  sdk: '>=3.3.1 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: 2.6.1
  riverpod_annotation: 2.6.1
  url_launcher: 6.3.1
  flutter_compass: 0.8.1
  geolocator: 10.1.1
  adhan: 2.0.0+1
  hijri: 3.0.0
  share_plus: 7.2.2
  shared_preferences: 2.2.3
  path_provider: 2.1.4
  intl: 0.20.2
  http: 1.6.0
  ffmpeg_kit_min_gpl: 6.0.3+2-LTS
  flutter_local_notifications: 21.0.0
  audioplayers: 5.2.1
  scrollable_positioned_list: 0.3.8
  permission_handler: 12.0.1
  timezone: 0.11.0
  hive: 2.2.3
  hive_flutter: 1.1.0
  connectivity_plus: 5.0.2
  geocoding: 2.2.2
  home_widget: 0.9.0
  # proximity_sensor removido - usando EventChannel nativo para sensor de proximidad

  cached_network_image: ^3.3.1
  device_info_plus: 10.1.0
  google_fonts: 8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: 3.0.2
  build_runner: 2.4.9
  riverpod_generator: 2.4.0
  cupertino_icons: 1.0.8

flutter:
  uses-material-design: true
  generate: true

  # Assets de audio para Adhan y otros sonidos
  assets:
    - assets/audio/
    - assets/hadiths/
    - assets/data/
    - assets/images/prayer_positions/

  # Fuentes personalizadas Amiri
  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
    - family: AmiriQuran
      fonts:
        - asset: assets/fonts/AmiriQuran.ttf

dependency_overrides:
  path_provider_android: 2.2.19
  shared_preferences_android: 2.4.13
  url_launcher_android: 6.3.20
  win32: 5.13.0
