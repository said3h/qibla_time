name: qibla_time
description: "A new Flutter project."
publish_to: 'none'

version: 1.3.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.20.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  url_launcher: ^6.3.1
  flutter_compass: ^0.8.1
  geolocator: ^12.0.0
  adhan: ^2.0.0+1
  hijri: ^3.0.0
  share_plus: ^10.0.0
  shared_preferences: ^2.2.3
  intl: ^0.20.2
  http: ^1.2.1
  flutter_local_notifications: ^17.2.2
  audioplayers: ^6.1.0
  permission_handler: ^11.3.1
  timezone: ^0.9.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.1.5
  geocoding: ^3.0.0
  home_widget: ^0.6.0
  proximity_sensor: ^1.0.1
  
  # Google Fonts para tipografía DM Sans y Amiri (árabe)
  google_fonts: 6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  cupertino_icons: ^1.0.8

flutter:
  uses-material-design: true

  # Assets de audio para Adhan y otros sonidos
  assets:
    - assets/audio/
    - assets/hadiths/
    - assets/data/

  # Fuentes personalizadas Amiri
  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
    - family: AmiriQuran
      fonts:
        - asset: assets/fonts/AmiriQuran.ttf

dependency_overrides:
  path_provider_android: ^2.2.23
  win32: ^5.5.0
